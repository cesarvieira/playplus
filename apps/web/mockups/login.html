<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login · Play+</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: #14100d;
      color: #f5eee8;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    @media (min-width: 768px) {
      body { padding: 32px; }
    }
    .card {
      display: flex;
      width: 100%;
      max-width: 64rem;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid #2c231d;
      box-shadow: 0 24px 60px rgb(0 0 0 / 0.45);
    }
    .hero {
      display: none;
      width: 480px;
      flex-shrink: 0;
      flex-direction: column;
      justify-content: space-between;
      padding: 44px;
      background: linear-gradient(150deg, #f4cda9 0%, #ec9e84 55%, #e07e7a 100%);
    }
    @media (min-width: 768px) {
      .hero { display: flex; }
    }
    .hero-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hero-brand span {
      font-size: 25px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #2a1410;
    }
    .hero-posters {
      display: flex;
      align-items: flex-end;
      gap: 14px;
    }
    .hero-posters div:nth-child(1) {
      width: 96px;
      height: 140px;
      border-radius: 16px;
      background: rgb(42 20 16 / 0.18);
    }
    .hero-posters div:nth-child(2) {
      width: 96px;
      height: 172px;
      border-radius: 16px;
      background: rgb(42 20 16 / 0.30);
    }
    .hero-posters div:nth-child(3) {
      width: 96px;
      height: 120px;
      border-radius: 16px;
      background: rgb(42 20 16 / 0.14);
    }
    .hero-copy h2 {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: #2a1410;
    }
    .hero-copy p {
      margin: 10px 0 0;
      font-size: 13px;
      font-weight: 500;
      color: rgb(42 20 16 / 0.72);
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 32px;
      background: #1b1511;
    }
    @media (min-width: 768px) {
      .main { padding: 56px; }
    }
    .main h1 {
      margin: 0;
      font-size: 25px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #f5eee8;
    }
    .main .subtitle {
      margin: 6px 0 32px;
      font-size: 13px;
      font-weight: 500;
      color: #9a8c82;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    .field:last-of-type {
      margin-bottom: 28px;
    }
    label {
      font-size: 13px;
      font-weight: 600;
      color: #c7bbb1;
    }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      height: 50px;
      padding: 0 16px;
      border: 1.5px solid #382c24;
      border-radius: 14px;
      background: #241d17;
      color: #f5eee8;
      font: inherit;
      font-size: 15px;
      outline: none;
    }
    input::placeholder {
      color: #9a8c82;
    }
    input:focus-visible {
      outline: 2px solid #e8956b;
      outline-offset: 2px;
    }
    .password-wrap {
      position: relative;
    }
    .password-wrap input {
      padding-right: 88px;
    }
    .password-toggle {
      position: absolute;
      top: 50%;
      right: 16px;
      transform: translateY(-50%);
      border: 0;
      padding: 0;
      background: none;
      color: #b59c8c;
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .submit {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 15px;
      background: linear-gradient(135deg, #f0b894, #e07e7a);
      color: #2a1410;
      font: inherit;
      font-size: 15.5px;
      font-weight: 800;
      cursor: pointer;
    }
    .submit:hover {
      opacity: 0.95;
    }
    .forgot {
      margin: 18px 0 0;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: #b59c8c;
    }
    .forgot a {
      color: inherit;
      text-decoration: none;
    }
    .forgot a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="card">
    <aside class="hero" aria-hidden="true">
      <div class="hero-brand">
        <svg width="32" height="32" viewBox="0 0 16 12" fill="none" aria-hidden="true">
          <rect width="16" height="12" rx="3.9" fill="#2a1410" fill-opacity="0.9"></rect>
          <g fill="#f5eee8">
            <path d="M6.53 3.4L6.53 8.6L10.93 6Z"></path>
            <path d="M11.3 2.6h0.8v1.1h1.1v0.8h-1.1v1.1h-0.8v-1.1h-1.1v-0.8h1.1z"></path>
          </g>
        </svg>
        <span>Play+</span>
      </div>

      <div class="hero-posters">
        <div></div>
        <div></div>
        <div></div>
      </div>

      <div class="hero-copy">
        <h2>Seu cinema<br>particular.</h2>
        <p>Guarde, assista e retome de onde parou.</p>
      </div>
    </aside>

    <main class="main">
      <h1>Bem-vindo de volta</h1>
      <p class="subtitle">Faça login para continuar.</p>

      <form action="#" method="post" novalidate>
        <div class="field">
          <label for="login-email">E-mail</label>
          <input
            id="login-email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="seu@email.com"
            value="test@test.net"
          >
        </div>

        <div class="field">
          <label for="login-password">Senha</label>
          <div class="password-wrap">
            <input
              id="login-password"
              name="password"
              type="password"
              autocomplete="current-password"
              value="password"
            >
            <button type="button" class="password-toggle" tabindex="-1" aria-hidden="true">mostrar</button>
          </div>
        </div>

        <button type="submit" class="submit">Entrar</button>
      </form>

      <p class="forgot"><a href="#">Esqueceu a senha?</a></p>
    </main>
  </div>

</body>
</html>
