services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: playplus
      POSTGRES_PASSWORD: playplus
      POSTGRES_DB: playplus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U playplus -d playplus']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: no

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: no

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # URL pública (via Caddy) usada para validar a assinatura das presigned URLs.
      MINIO_SERVER_URL: https://storage.playplus.localhost
      MINIO_API_CORS_ALLOW_ORIGIN: http://localhost:3001,http://localhost:3002,https://admin.playplus.localhost,https://web.playplus.localhost
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: no

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: no
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      STORAGE_BUCKET: ${STORAGE_BUCKET:-playplus}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$STORAGE_BUCKET &&
      mc anonymous set download local/$$STORAGE_BUCKET &&
      exit 0
      "

  caddy:
    image: caddy:2-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: no

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
